# defaults.yaml

# Data
data:
  data_dir: "/mnt/data_lab513/adni/sMRI/processed/data/"
  feature_csv_path: "/home/minhtri/Molecular_AD/data/mri_features_filtered.csv"
  cache_dir: "/home/minhtri/Molecular_AD/output/cache"
  batch_size: 16
  num_workers: 8

# Model
model:
  name: "beta_tc_vae"
  z_dim: 256
  in_channels: 1
  cluster_projection_dim: 128

# Training
training:
  max_epochs: 100
  lr: 1e-4
  optimizer: "adam"
  scheduler: null
  checkpoint_dir: "../checkpoints/"
  log_dir: "../logs/"
  dci_every_n_epochs: 1
  top_k: 30
  estimate_c_every: 5
  estimate_c_warmup: 5
  estimate_c_until: 40

# Loss
loss:
  type: "beta_tc_vae"
  recon_weight: 5.0
  kl_weight: 1.0e-6
  prediction_weight: 1.0
  cluster_weight: 0.5
  n_clusters: 2

# Metrics
metrics:
  dci_alpha: 0.1

# Transform
transform:
  target_shape: [96, 96, 96]
  margin: 5