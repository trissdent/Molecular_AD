# defaults.yaml

# Data
data:
  data_dir: "/mnt/data_lab513/adni/sMRI/processed/data/"
  feature_csv_path: "/home/minhtri/Molecular_AD/data/mri_features.csv"
  cache_dir: "/home/minhtri/Molecular_AD/output/cache"
  batch_size: 128
  num_workers: 8

# Model
model:
  name: "beta_tc_vae"
  z_dim: 32
  in_channels: 1
  num_features: 539
  cluster_projection_dim: 64

# Training
training:
  max_epochs: 50
  lr: 0.0001
  optimizer: "adam"
  scheduler: null
  checkpoint_dir: "../checkpoints/"
  log_dir: "../logs/"
  dci_every_n_epochs: 1
  top_k: 20

# Loss
loss:
  type: "beta_tc_vae"
  alpha: 1.0
  beta: 4.0
  gamma: 1.0
  recon_weight: 0.1
  prediction_weight: 1.0
  cluster_weight: 0.5
  n_clusters: 2

# Metrics
metrics:
  dci_alpha: 0.1

# Transform
transform:
  target_shape: [64, 64, 64]
  margin: 5